<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>cars</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 600px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        h1 {
            color: #333;
        }
    </style>

</head>
<body>

    <h1>List of cars</h1>

    <div style="margin-bottom: 20px;">
        <a href="/cars">All cars</a> |
        <a href="/cars?count=2">First 2 cars</a> |
        <a href="/cars?count=3">First 3 cars</a>
    </div>
    <table>
        <thead>
        <tr>
            <th>Model</th>
            <th>Color</th>
            <th>Year</th>
        </tr>
        </thead>
        <tbody>

        <tr th:each="car : ${cars}">
            <td th:text="${car.model}">BMW</td>
            <td th:text="${car.color}">Red</td>
            <td th:text="${car.year}">2020</td>
        </tr>
        </tbody>
    </table>

    <p th:if="${cars.isEmpty()}" style="color: red;">
        No cars found
    </p>

    <p th:unless="${cars.isEmpty()}" style="margin-top: 10px;">
        Total cars: <span th:text="${cars.size()}">0</span>
    </p>



</body>
</html>
